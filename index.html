<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Potager IA Ultime</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b5e20">

<style>
body{font-family:Arial;margin:0;background:#f3f8f4;}
header{background:#145a32;color:white;padding:14px;text-align:center;}
.container{padding:12px;}
.card{background:white;padding:12px;margin-bottom:10px;border-radius:12px;}

.calendar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.month{background:white;padding:12px;border-radius:10px;text-align:center;font-weight:bold;cursor:pointer;}
.month:hover{background:#dff5e1;}

.alert{padding:10px;border-radius:8px;font-weight:bold;margin-top:8px;}
.good{background:#e8f5e9;color:#1b5e20;}
.warn{background:#fff3e0;color:#e65100;}
.danger{background:#ffebee;color:#b71c1c;}

button{padding:10px;border:none;border-radius:8px;background:#1b5e20;color:white;cursor:pointer;}
</style>
</head>

<body>

<header>🌱 Potager IA Ultime</header>

<div class="container">

<div class="card">
<h3>🌦 Météo + Gel IA</h3>
<p id="meteo">Chargement...</p>
<div id="alert"></div>
</div>

<div class="card">
<h3>🏡 Mode culture</h3>
<button onclick="toggleMode()" id="modeBtn">Mode : Extérieur 🌿</button>
<p id="modeTxt"></p>
</div>

<div class="card">
<h3>📅 Calendrier</h3>
<div class="calendar" id="cal"></div>
</div>

</div>

<script>

let mode="ext";
let lat=47.9, lon=1.9;

function toggleMode(){
mode = mode==="ext"?"serre":"ext";
document.getElementById("modeBtn").innerText =
mode==="ext"?"Mode : Extérieur 🌿":"Mode : Serre 🏠";
document.getElementById("modeTxt").innerText =
mode==="ext"?"Culture normale":"Culture protégée serre";
}

async function weather(){
const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_min&timezone=auto`;
const r=await fetch(url);
const d=await r.json();

let t=d.current_weather.temperature;
let n=d.daily.temperature_2m_min[0];

let msg="", type="good";

if(n<=0){msg="❄️ GEL CRITIQUE"; type="danger";}
else if(n<=3){msg="⚠️ risque gel"; type="warn";}
else{msg="🌱 OK jardin"; type="good";}

document.getElementById("meteo").innerText=
`Temp: ${t}°C | Nuit: ${n}°C`;

document.getElementById("alert").innerHTML=
`<div class='alert ${type}'>${msg}</div>`;
}

weather();

const cal=document.getElementById("cal");
const months=["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];

months.forEach((m,i)=>{
let d=document.createElement("div");
d.className="month";
d.innerText=m;
d.onclick=()=>alert("Mois "+m);
cal.appendChild(d);
});

</script>

</body>
</html>
